{% extends "base.html" %}
{% block title %}Vinylog · Forbidden{% endblock %}
{% block content %}
<div class="container" style="padding: 4rem 0; text-align: center;">
    <div style="max-width: 600px; margin: 0 auto;">
        <h1 style="font-size: 6rem; font-weight: 700; margin-bottom: 1rem; color: #fff;">403</h1>
        <h2 style="font-size: 2rem; margin-bottom: 1rem; color: #fff;">Forbidden</h2>
        <p style="font-size: 1.1rem; color: #999; margin-bottom: 2rem; line-height: 1.6;">
            You don't have permission to access this resource. This record is locked.
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <a href="{{ url_for('home') }}" class="btn btn--primary">Go Home</a>
            <a href="{{ url_for('login_page') }}" class="btn btn--ghost">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
