{% extends "base.html" %}
{% block title %}Vinylog · Page Not Found{% endblock %}
{% block content %}
<div class="container" style="padding: 4rem 0; text-align: center;">
    <div style="max-width: 600px; margin: 0 auto;">
        <h1 style="font-size: 6rem; font-weight: 700; margin-bottom: 1rem; color: #fff;">404</h1>
        <h2 style="font-size: 2rem; margin-bottom: 1rem; color: #fff;">Page Not Found</h2>
        <p style="font-size: 1.1rem; color: #999; margin-bottom: 2rem; line-height: 1.6;">
            The record you're looking for has been scratched. This page doesn't exist or has been moved.
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <a href="{{ url_for('home') }}" class="btn btn--primary">Go Home</a>
            <a href="{{ url_for('albums_page') }}" class="btn btn--ghost">Browse Albums</a>
        </div>
    </div>
</div>
{% endblock %}
