{% extends "base.html" %}
{% block title %}Vinylog · Server Error{% endblock %}
{% block content %}
<div class="container" style="padding: 4rem 0; text-align: center;">
    <div style="max-width: 600px; margin: 0 auto;">
        <h1 style="font-size: 6rem; font-weight: 700; margin-bottom: 1rem; color: #fff;">500</h1>
        <h2 style="font-size: 2rem; margin-bottom: 1rem; color: #fff;">Internal Server Error</h2>
        <p style="font-size: 1.1rem; color: #999; margin-bottom: 2rem; line-height: 1.6;">
            Something went wrong on our end. The turntable is skipping. We're working to fix it.
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <a href="{{ url_for('home') }}" class="btn btn--primary">Go Home</a>
            <button onclick="window.location.reload()" class="btn btn--ghost">Try Again</button>
        </div>
    </div>
</div>
{% endblock %}
