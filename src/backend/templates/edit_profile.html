{% extends "base.html" %}
{% block title %}Settings · {{ user.username }}{% endblock %}
{% block content %}

<section class="settings settings--page">
    <div class="settings__card">
        <div class="settings__header">
            <p class="eyebrow">Personalize</p>
            <h1 class="settings__title">User Profile</h1>
        </div>
        <form action="{{ url_for('update_user') }}" method="post" class="settings__form" enctype="multipart/form-data">
            <div class="form-field settings__field">
                <label class="form-field__label" for="full-name">Full Name</label>
                <input class="form-field__input" type="text" id="full-name" name="full_name"
                    value="{{ user.full_name }}" required>
            </div>

            <div class="form-field settings__field">
                <label class="form-field__label" for="biography">Biography</label>
                <textarea class="form-field__textarea" id="biography" name="biography" rows="4"
                    placeholder="Tell us about yourself...">{{ user.biography }}</textarea>
            </div>

            <div class="form-field settings__field">
                <label class="form-field__label" for="birth-date">Birth Date</label>
                <input class="form-field__input" type="date" id="birth-date" name="birth_date"
                    value="{{ user.birth_date }}" required>
            </div>

            <div class="form-field settings__field">
                <label class="form-field__label">Profile Picture</label>

                <div class="file-upload-wrapper">
                    <input type="file" id="profile-picture" name="profile_picture" class="file-upload__input"
                        accept="image/*">

                    <label for="profile-picture" class="file-upload__label">
                        <span class="file-upload__text" id="file-name-display">Upload new picture</span>
                    </label>
                </div>
            </div>

            <div class="settings__favourites">
                <div class="settings__favourites-header">
                    <label class="form-field__label" for="album-search">Favourite Albums (max 4)</label>
                    <p class="settings__helper">Give a quick shout to the releases you live with.</p>
                </div>
                <input class="form-field__input" type="text" id="album-search" placeholder="Search albums...">
                <div id="search-results" class="settings__results"></div>
                <div id="selected-albums" class="settings__selected-list">
                    {% for album in user.favourite_albums %}
                    <div class="settings__selected" data-id="{{ album.spotify_id }}">
                        <img src="{{ album.cover_url }}" width="40" class="settings__selected-cover">
                        <span class="settings__selected-title">{{ album.title }} - {{ album.artist.name }}</span>
                        <button type="button" class="settings__remove" aria-label="Remove album">×</button>
                        <input type="hidden" name="favourite_albums" value="{{ album.spotify_id }}">
                    </div>
                    {% endfor %}
                </div>
            </div>
            <hr class="divider">
            <div class="settings__actions">
                <div>
                    <button type="submit" class="btn btn--primary" id="save-button">Save Changes</button>
                    <button type="button" id="cancel-button" class="btn btn--ghost"
                        data-url="{{ url_for('my_profile') }}">Cancel</button>
                </div>
                <button type="button" id="logout-button" class="btn btn--danger">Log Out</button>
            </div>
        </form>
    </div>
</section>
<script>
    const searchInput = document.getElementById("album-search");
    const resultsDiv = document.getElementById("search-results");
    const selectedDiv = document.getElementById("selected-albums");
    const MAX_FAVOURITES = 4;

    const toggleSearchVisibility = () => {
        const currentCount = selectedDiv.children.length;
        if (currentCount >= MAX_FAVOURITES) {
            searchInput.style.display = 'none';
            resultsDiv.style.display = 'none';
            if (!document.getElementById('max-albums-message')) {
                const message = document.createElement('p');
                message.id = 'max-albums-message';
                message.className = 'settings__limit-message';
                message.textContent = `Maximum of ${MAX_FAVOURITES} favourite albums selected. Remove one to search again.`;
                selectedDiv.insertAdjacentElement('afterend', message);
            }
        } else {
            searchInput.style.display = 'block';
            resultsDiv.style.display = 'block';
            const message = document.getElementById('max-albums-message');
            if (message) {
                message.remove();
            }
        }
    };

    // Function to attach the remove listener to all existing and new remove buttons
    const attachRemoveListeners = () => {
        document.querySelectorAll(".settings__remove").forEach(button => {
            if (!button.dataset.listenerAttached) {
                button.addEventListener("click", () => {
                    button.closest(".settings__selected").remove();
                    toggleSearchVisibility();
                });
                button.dataset.listenerAttached = true;
            }
        });
    };

    // --- Existing Event Listeners ---

    const cancelBtn = document.getElementById('cancel-button');

    cancelBtn.addEventListener('click', () => {
        const targetUrl = cancelBtn.getAttribute('data-url');
        window.location.href = targetUrl;
    });
    document.getElementById('logout-button').addEventListener('click', () => {
        window.location.href = "/auth/logout";
    });

    searchInput.addEventListener("input", async () => {
        const query = searchInput.value;
        if (!query) {
            resultsDiv.innerHTML = "";
            return;
        }

        const res = await fetch(`/albums/search?q=${encodeURIComponent(query)}`);
        const albums = await res.json();

        resultsDiv.innerHTML = albums.map(album => `
        <div class="settings__search-item" data-id="${escapeHtml(String(album.id))}">
            ${album.image ? `<img src="${escapeHtml(album.image)}" width="50">` : ''}
            <span class="settings__search-text">${escapeHtml(album.title)} - ${escapeHtml(album.artist_name)}</span>
            <button type="button" class="btn btn--ghost btn--sm settings__add">Add</button>
        </div>
        `).join("");

        // Add click listeners for the "Add" buttons
        document.querySelectorAll(".settings__add").forEach(button => {
            button.addEventListener("click", () => {
                const item = button.parentElement;

                if (selectedDiv.children.length >= MAX_FAVOURITES) return;

                // Check if album is already selected
                const id = item.dataset.id;
                const isAlreadySelected = Array.from(selectedDiv.querySelectorAll('input[name="favourite_albums"]'))
                    .some(input => input.value === id);

                if (isAlreadySelected) return;

                const text = item.querySelector(".settings__search-text").textContent.trim();
                const img = item.querySelector("img") ? item.querySelector("img").outerHTML : "";

                const selection = document.createElement("div");
                selection.className = "settings__selected";
                selection.dataset.id = id;
                selection.innerHTML = `
                    ${img}
                    <span class="settings__selected-title">${escapeHtml(text)}</span>
                    <button type="button" class="settings__remove" aria-label="Remove album">×</button>
                    <input type="hidden" name="favourite_albums" value="${escapeHtml(String(id))}">
                `;

                selectedDiv.appendChild(selection);

                // Attach remove listener immediately after adding
                attachRemoveListeners();

                toggleSearchVisibility();

                resultsDiv.innerHTML = "";
                searchInput.value = "";
            });
        });
    });

    document.getElementById('profile-picture').addEventListener('change', function (e) {
        const fileName = e.target.files[0]?.name;
        const label = document.querySelector('.file-upload__label');
        const textSpan = document.getElementById('file-name-display');

        if (fileName) {
            textSpan.textContent = fileName;
            label.classList.add('has-file');
        } else {
            textSpan.textContent = "Click to upload new picture";
            label.classList.remove('has-file');
        }
    });

    attachRemoveListeners();
    toggleSearchVisibility();
</script>
{% endblock %}
