{% extends "base.html" %}
{% block title %}Vinylog · Error{% endblock %}
{% block content %}
<div class="container" style="padding: 4rem 0; text-align: center;">
    <div style="max-width: 600px; margin: 0 auto;">
        <h1 style="font-size: 6rem; font-weight: 700; margin-bottom: 1rem; color: #fff;">{{ status_code }}</h1>
        <h2 style="font-size: 2rem; margin-bottom: 1rem; color: #fff;">{{ error_title }}</h2>
        <p style="font-size: 1.1rem; color: #999; margin-bottom: 2rem; line-height: 1.6;">
            {% if error_message %}
            {{ error_message }}
            {% else %}
            An error occurred. Please try again later.
            {% endif %}
        </p>
        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <a href="{{ url_for('home') }}" class="btn btn--primary">Go Home</a>
            <button onclick="window.history.back()" class="btn btn--ghost">Go Back</button>
        </div>
    </div>
</div>
{% endblock %}
