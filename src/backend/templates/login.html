{% extends "base.html" %}

{% block title %}Vinylog · Login{% endblock %}

{% block content %}
<section class="auth auth--login">
    <div class="auth__card">
        <div class="auth__header">
            <p class="eyebrow">Welcome back</p>
            <h1 class="auth__title">Log in</h1>
        </div>
        <form action="{{ url_for('login_form') }}" method="post" class="auth__form">
            <div class="form-field">
                <label class="form-field__label" for="email">Email</label>
                <input class="form-field__input" type="email" name="email" id="email" required>
            </div>

            <div class="form-field">
                <label class="form-field__label" for="password">Password</label>
                <input class="form-field__input" type="password" name="password" id="password" required>
            </div>

            <button type="submit" class="btn btn--primary auth__submit">Login</button>
        </form>
        <p class="auth__alt">
            Do not have an account?
            <a class="auth__link" href="{{ url_for('signup_page')}}">Sign up</a>
        </p>
        {% if error %}
        <p class="auth__error">{{ error }}</p>
        {% endif %}
    </div>
</section>
{% endblock %}
