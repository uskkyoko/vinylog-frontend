{% extends "base.html" %}

{% block title %}Vinylog · Sign Up{% endblock %}

{% block content %}
<section class="auth auth--signup">
    <div class="auth__card">
        <div class="auth__header">
            <p class="eyebrow">Join the club</p>
            <h1 class="auth__title">Create account</h1>
        </div>
        <form action="{{ url_for('signup_form') }}" method="post" class="auth__form">
            <div class="form-field">
                <label class="form-field__label" for="full-name">Full Name</label>
                <input class="form-field__input" type="text" name="full_name" id="full-name" required>
            </div>

            <div class="form-field">
                <label class="form-field__label" for="username">Username</label>
                <input class="form-field__input" type="text" name="username" id="username" required>
            </div>

            <div class="form-field">
                <label class="form-field__label" for="email">Email</label>
                <input class="form-field__input" type="email" name="email" id="email" required>
            </div>

            <div class="form-field">
                <label class="form-field__label" for="password">Password</label>
                <input class="form-field__input" type="password" name="password" id="password" required>
            </div>

            <div class="form-field">
                <label class="form-field__label" for="birth-date">Birth Date</label>
                <input class="form-field__input" type="date" id="birth-date" name="birth_date" required>
            </div>

            <button type="submit" class="btn btn--primary auth__submit">Sign Up</button>
        </form>
        <p class="auth__alt">
            Already have an account?
            <a class="auth__link" href="{{ url_for('login_page')}}">Log in</a>
        </p>
        {% if error %}
        <p class="auth__error">{{ error }}</p>
        {% endif %}
    </div>
</section>
{% endblock %}
